<div class="logos-section">

  <div id="carouselLogos" class="carousel slide mb-5">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselLogos"
              data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#carouselLogos"
              data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#carouselLogos"
              data-bs-slide-to="2"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="/images/Blood_banner_rojo_venom.jpg"
             class="d-block w-100" alt="Blood Banner Rojo Venom"
             width="1920" height="800" fetchpriority="high">
      </div>
      <div class="carousel-item">
        <img src="/images/Blood_banner.jpg"
             class="d-block w-100" alt="Blood Banner"
             width="1920" height="800" loading="lazy">
      </div>
      <div class="carousel-item">
        <img src="/images/Blood_banner_blanco.jpg"
             class="d-block w-100" alt="Blood Banner Blanco"
             width="1920" height="800" loading="lazy">
      </div>
    </div>
    <button class="carousel-control-prev" type="button"
            data-bs-target="#carouselLogos" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button"
            data-bs-target="#carouselLogos" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <div class="descargas">
    <h3 class="descargas-title">DESCARGAR LOGOS</h3>
    <div class="descargas-grid">
      <a href="/images/Blood_banner_rojo_venom.jpg"
         download class="descarga-card">
        <span class="descarga-name">BANNER ROJO VENOM</span>
        <span class="descarga-format">JPG</span>
      </a>
      <a href="/images/Blood_banner.jpg"
         download class="descarga-card">
        <span class="descarga-name">BANNER PRINCIPAL</span>
        <span class="descarga-format">JPG</span>
      </a>
      <a href="/images/Blood_banner_blanco.jpg"
         download class="descarga-card">
        <span class="descarga-name">BANNER BLANCO</span>
        <span class="descarga-format">JPG</span>
      </a>
    </div>
  </div>

</div>
