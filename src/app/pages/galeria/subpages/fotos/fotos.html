<div class="fotos-section">

  <div id="carouselFotos" class="carousel slide">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselFotos"
              data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#carouselFotos"
              data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#carouselFotos"
              data-bs-slide-to="2"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="/images/Blood_imagen1.jpg"
             class="d-block w-100" alt="Blood en vivo 1"
             width="1920" height="800" fetchpriority="high">
      </div>
      <div class="carousel-item">
        <img src="/images/Blood_imagen2.jpg"
             class="d-block w-100" alt="Blood en vivo 2"
             width="1920" height="800" loading="lazy">
      </div>
      <div class="carousel-item">
        <img src="/images/Blood_imagen3.jpg"
             class="d-block w-100" alt="Blood en vivo 3"
             width="1920" height="800" loading="lazy">
      </div>
    </div>
    <button class="carousel-control-prev" type="button"
            data-bs-target="#carouselFotos" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button"
            data-bs-target="#carouselFotos" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

</div>
